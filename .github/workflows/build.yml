name: Build Zygisk Module

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Game Package Name'
        required: true
        default: 'com.tencent.tmgp.sgame'
      module_name:
        description: 'Zygisk Module Name'
        required: true
        default: 'Il2CppDumper'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip source
        run: |
          unzip Zygisk-Il2CppDumper-master.zip
          mv Zygisk-Il2CppDumper-master/* .
          rm -rf Zygisk-Il2CppDumper-master

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Update module.gradle
        run: |
          sed -i "s|targetPackageName = .*|targetPackageName = '${{ github.event.inputs.package_name }}'|" module.gradle
          sed -i "s|moduleName = .*|moduleName = '${{ github.event.inputs.module_name }}'|" module.gradle

      - name: Build module
        run: ./gradlew :module:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zygisk-Il2CppDumper-${{ github.event.inputs.package_name }}
          path: out/*.zip
